<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #e6f3ff, #cce7ff);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        background: #ffffff;
        padding: 35px;
        width: 100%;
        max-width: 540px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 115, 230, 0.15);
        border: 1px solid #e0e6ed;
    }

    .header {
        text-align: center;
        margin-bottom: 25px;
    }

    .header h2 {
        color: #0176d3;
        font-weight: 600;
        margin-bottom: 5px;
    }

    .header p {
        font-size: 13px;
        color: #5f6b7a;
    }

    .form-group {
        margin-bottom: 16px;
    }

    .form-row {
        display: flex;
        gap: 12px;
    }

    label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #34495e;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccd6e0;
        font-size: 14px;
        transition: all 0.25s ease;
        background: #f9fbfd;
    }

    input:focus {
        border-color: #0176d3;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(1,118,211,0.15);
        outline: none;
    }

    input::placeholder {
        color: #9aa5b1;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #0176d3;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s ease;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background: #025bb5;
        box-shadow: 0 6px 18px rgba(1,118,211,0.3);
        transform: translateY(-1px);
    }

    .footer {
        text-align: center;
        font-size: 12px;
        margin-top: 15px;
        color: #7a869a;
    }

    @media(max-width: 600px) {
        .form-row {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h2>Lead Management System</h2>
        <p>Capture and manage leads efficiently</p>
    </div>

    <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHn000007dmU7" method="POST">

        <input type="hidden" name="oid" value="00DHn000007dmU7">
        <input type="hidden" name="retURL" value="https://jaydeepdas.github.io/thank-you-page/">

        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input name="first_name" type="text" placeholder="Enter first name" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input name="last_name" type="text" placeholder="Enter last name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input name="email" type="email" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
            <label>Company</label>
            <input name="company" type="text" placeholder="Company name">
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input name="mobile" type="tel" placeholder="Phone number">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input name="city" type="text" placeholder="City">
            </div>

            <div class="form-group">
                <label>State</label>
                <input name="state" type="text" placeholder="State">
            </div>
        </div>

        <button type="submit" class="submit-btn">Submit Lead</button>

        <div class="footer">
            Powered by Lead Management System • Secure & Reliable
        </div>

    </form>
</div>

</body>
</html>
