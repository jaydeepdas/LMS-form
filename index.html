<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #e6f2ff, #d6ebff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.card {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 10px 30px rgba(1,118,211,0.15);
}
h2 {
    text-align: center;
    color: #0176d3;
    margin-bottom: 20px;
}
.form-group {
    margin-bottom: 15px;
}
.form-row {
    display: flex;
    gap: 40px;
}
label {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 5px;
    display: block;
}
input, select {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: 1px solid #ccd6e0;
    background: #f9fbfd;
}
input:focus, select:focus {
    border-color: #0176d3;
    box-shadow: 0 0 0 3px rgba(1,118,211,0.15);
    outline: none;
    background: #fff;
}
button {
    width: 100%;
    padding: 13px;
    background: #0176d3;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
}
button:hover {
    background: #025bb5;
}
@media(max-width:600px){
    .form-row { flex-direction: column; }
}
</style>
</head>

<body>

<div class="card">
<h2>Lead Management System</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHn000007dmU7" method="POST">

<input type="hidden" name="oid" value="00DHn000007dmU7">
<input type="hidden" name="retURL" value="https://jaydeepdas.github.io/thank-you-page/">

<!-- 🔥 Trigger Assignment Rule -->
<input type="hidden" name="assign" value="1">
<input type="hidden" name="lead_source" value="Web">
<div class="form-row">
    <div class="form-group">
        <label>First Name</label>
        <input name="first_name" required>
    </div>
    <div class="form-group">
        <label>Last Name</label>
        <input name="last_name" required>
    </div>
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" name="email" required>
</div>

<div class="form-group">
    <label>Mobile</label>
    <input name="mobile">
</div>

<div class="form-group">
    <label>Company</label>
    <input name="company" required>
</div>

<!-- Address -->
<div class="form-group">
    <label>Address</label>
    <input name="00NHn00000ZXHKp">
</div>

<!-- State Picklist -->
<div class="form-group">
    <label>State</label>
    <select name="00NHn00000ZXHKk" required>
        <option value="">-- Select State --</option>
        <option>Alabama</option>
        <option>Alaska</option>
        <option>Arizona</option>
        <option>Arkansas</option>
        <option>California</option>
        <option>Colorado</option>
        <option>Connecticut</option>
        <option>Delaware</option>
        <option>Florida</option>
        <option>Georgia</option>
        <option>Hawaii</option>
        <option>Idaho</option>
        <option>Illinois</option>
        <option>Indiana</option>
        <option>Iowa</option>
        <option>Kansas</option>
        <option>Kentucky</option>
        <option>Louisiana</option>
        <option>Maine</option>
        <option>Maryland</option>
        <option>Massachusetts</option>
        <option>Michigan</option>
        <option>Minnesota</option>
        <option>Mississippi</option>
        <option>Missouri</option>
        <option>Montana</option>
        <option>Nebraska</option>
        <option>Nevada</option>
        <option>New Hampshire</option>
        <option>New Jersey</option>
        <option>New Mexico</option>
        <option>New York</option>
        <option>North Carolina</option>
        <option>North Dakota</option>
        <option>Ohio</option>
        <option>Oklahoma</option>
        <option>Oregon</option>
        <option>Pennsylvania</option>
        <option>Rhode Island</option>
        <option>South Carolina</option>
        <option>South Dakota</option>
        <option>Tennessee</option>
        <option>Texas</option>
        <option>Utah</option>
        <option>Vermont</option>
        <option>Virginia</option>
        <option>Washington</option>
        <option>West Virginia</option>
        <option>Wisconsin</option>
        <option>Wyoming</option>
    </select>
</div>
<!-- Product -->
<div class="form-group">
    <label>Product</label>
    <select id="product" name="00NHn00000ZXHB7" onchange="updateSubProducts()" required>
        <option value="">-- Select Product --</option>
        <option value="Home">Home</option>
        <option value="Auto">Auto</option>
        <option value="Renters">Renters</option>
        <option value="Condo">Condo</option>
        <option value="General Liability (Commercial)">General Liability (Commercial)</option>
    </select>
</div>

<!-- Sub Product -->
<div class="form-group">
    <label>Sub Product</label>
    <select id="subProduct" name="00NHn00000ZXHBC" required>
        <option value="">-- Select Sub Product --</option>
    </select>
</div>

<button type="submit">Submit Lead</button>

</form>
</div>

<script>
const mapping = {
    "Home": ["Dwelling","Other Structures","Personal Property","Personal Liability","Loss of Use"],
    "Auto": ["Collision","Comprehensive","Personal Injury Protection","Uninsured Motorist","Liability"],
    "Renters": ["Personal Property","Personal Liability","Loss of Use"],
    "Condo": ["Interior Coverage","Loss Assessment","Personal Property","Liability"],
    "General Liability (Commercial)": ["Bodily Injury","Property Damage","Personal Injury","Products Liability","Legal Liability"]
};

function updateSubProducts() {
    const product = document.getElementById("product").value;
    const subProduct = document.getElementById("subProduct");

    subProduct.innerHTML = '<option value="">-- Select Sub Product --</option>';

    if(mapping[product]) {
        mapping[product].forEach(item => {
            let option = document.createElement("option");
            option.value = item;
            option.text = item;
            subProduct.appendChild(option);
        });
    }
}
</script>

</body>
</html>
